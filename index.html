<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phishing Email Test</title>
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;

            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;      
            padding: 20px;           

            margin: 0;
        }

        .container {
            text-align: center;
        }

        #emailBox {
            background-color: white;
            border: 1px solid #ccc;
            padding: 20px;
            width: 90%;           
            max-width: 500px;     
            margin: 20px auto;
            text-align: left;
            border-radius: 8px;
            box-sizing: border-box; 
        }

        button {
            font-size: 16px;
            padding: 12px 20px;
            margin: 10px 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;

            background-color: #BEFF99;
            color: black;

            transition: all 0.2s ease;
        }

        #trialCounter {
            font-size: 18px;
            margin-bottom: 15px;
        }

        #emailBox p {
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            font-size: 16px; 
            padding: 10px 15px;
            margin: 10px 5px;
        }

        @media (max-width: 400px) {
            button {
                font-size: 14px;
                padding: 8px 12px;
            }
        }

        #feedback {
            font-size: 18px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">

        <h1>Phishing Email Test</h1>

        <!-- Start Screen (Input Details) --> 
        <div id="startScreen">
            <h2>Participant Information</h2>

            <label>What is your age?</label><br><br>
            <input type="number" id="age" min="10" max="100"><br><br>

            <label>How would you rate your level of technical experience?<br>(1 = Very Low, 10 = Very high)</label><br><br>
            <input type="range" id="experience" min="1" max="10" value="5">
            <p>Selected Value: <span id="expValue">5</span></p>

            <button onclick="startTest()">Start Test</button>
        </div>

        <!-- Test Screen (Email Questions) --> 
        <div id="testScreen" style="display:none;">

            <p id="trialCounter"></p>

            <div id="emailBox">
                <p><strong>From:</strong> <span id="sender"></span></p>
                <p><strong>Subject:</strong> <span id="subject"></span></p>
                <p id="body"></p>
            </div>

            <!-- Safe / Malicious buttons -->
            <div id="responseButtons">
                <button onclick="respond(false)">Safe</button>
                <button onclick="respond(true)">Malicious</button>
            </div>

            <p id="feedback"></p>

            <!-- Buttons for collecting test results -->
            <div id="endButtons" style="display:none;">
                <button onclick="downloadResults()">Download Results</button>
                <button onclick="copyResults()">Copy Results</button>
            </div>

        </div>

    </div>

    <script>
        const emailList = [ // Email Examples
            // Safe Emails
            {
                sender: "delivery@royalmail.com",
                subject: "Your parcel delivery window",
                body: "Your parcel is due for delivery tomorrow between 9:00–12:00. You can track or reschedule via the Royal Mail website. \n https://www.royalmail.com/track-your-item",
                malicious: false
            },
            {
                sender: "no-reply@natwest.co.uk",
                subject: "Your monthly statement is ready",
                body: "Your latest statement is now available. Please log in to your online banking account to view it securely. \n https://www.natwest.co.uk/login",
                malicious: false
            },
            {
                sender: "support@spotify.com",
                subject: "Subscription renewal confirmation",
                body: "Your Spotify subscription has been successfully renewed. You can manage your plan in your account settings. \n https://www.spotify.com/account",
                malicious: false
            },
            {
                sender: "info@nhs.uk",
                subject: "Appointment reminder",
                body: "You have an upcoming appointment scheduled. Please arrive 10 minutes early and bring any required documents. \n https://www.nhs.uk",
                malicious: false
            },
            {
                sender: "team@university.ac.uk",
                subject: "Timetable update available",
                body: "Your lecture timetable has been updated. Please check the student portal for the latest version. \n https://portal.university.ac.uk",
                malicious: false
            },

            // Harder Safe Emails
            {
                sender: "security@natwest.co.uk",
                subject: "Unusual login attempt detected",
                body: "We noticed a login attempt from a new device. If this was not you, please review your account activity via your usual banking app. \n https://www.natwest.co.uk/security",
                malicious: false
            },
            {
                sender: "accounts@amazon.co.uk",
                subject: "Action may be required on your account",
                body: "We noticed an issue with a recent order. Please review your account for further details using the official Amazon website. \n https://www.amazon.co.uk/your-account",
                malicious: false
            },
            {
                sender: "it-support@university.ac.uk",
                subject: "Mailbox storage warning",
                body: "Your mailbox is approaching its storage limit. Please review your storage usage through the university portal: \n https://mail.university.ac.uk",
                malicious: false
            },
            {
                sender: "notifications@linkedin.com",
                subject: "New sign-in from a different device",
                body: "We noticed a sign-in to your account from a new device. If this was you, no further action is needed. \n https://www.linkedin.com/security",
                malicious: false
            },
            {
                sender: "hr@company.co.uk",
                subject: "Updated internal document",
                body: "An updated internal document has been shared with you. Please access it through the company portal: \n https://portal.company.co.uk",
                malicious: false
            },

            // Malicious Emails
            {
                sender: "support@paypal-verification.com",
                subject: "Unusual activity detected",
                body: "We noticed a login attempt from a new device. Please confirm your details here: \n http://secure-paypal-check.com",
                malicious: true
            },
            {
                sender: "admin@microsoft-support.net",
                subject: "Security alert",
                body: "Your account settings were recently changed. If this wasn’t you, secure your account now: \n http://account-recovery-ms.net",
                malicious: true
            },
            {
                sender: "delivery@royalmail-tracking.net",
                subject: "Delivery attempt failed",
                body: "We were unable to deliver your parcel. Please reschedule here: \n http://royalmail-redelivery.net",
                malicious: true
            },
            {
                sender: "john.smith7743@gmail.com",
                subject: "Photos from the weekend",
                body: "Hey, I found those photos from the weekend — thought you’d want them: \n http://photo-share-now.com",
                malicious: true
            },
            {
                sender: "security@bank-alerts.co",
                subject: "Account activity notice",
                body: "We detected a login from a new location. Please review your account activity here: \n http://bank-security-check.co",
                malicious: true
            },

            // Harder Malicious Emails
            {
                sender: "support@apple-idverify.com",
                subject: "Action required for your Apple ID",
                body: "We need you to confirm your account information to avoid service interruption. Please review your details here: \n http://apple-verify-user.com",
                malicious: true
            },
            {
                sender: "alerts@netflix-billing.co",
                subject: "Issue with your latest payment",
                body: "We were unable to process your recent payment. Please update your billing details here: \n http://netflix-billing-update.co",
                malicious: true
            },
            {
                sender: "it-support@university-helpdesk.com",
                subject: "Mailbox storage notice",
                body: "Your mailbox is nearing its limit. To avoid disruption, review your storage here: \n http://university-mail-helpdesk.com",
                malicious: true
            },
            {
                sender: "security@paypal-alerts.com",
                subject: "Please review recent activity",
                body: "We noticed a recent transaction that requires verification. Please review it here: \n http://paypal-activity-check.com",
                malicious: true
            },
            {
                sender: "admin@amazon-account.co.uk",
                subject: "Important account information",
                body: "We need you to confirm your account details to prevent interruptions to your orders. Review here: \n http://amazon-account-check.co.uk",
                malicious: true
            }
        ];

        let trialIndex = 0; // Tracks current email
        let results = []; // Stores user responses

        let participantData = { // Stores participant details
            age: null,
            experience: null
        };

        window.onload = function () { // Updates the displayed value when slider is moved
            const slider = document.getElementById("experience");
            const output = document.getElementById("expValue");

            function updateSlider() {
                output.textContent = slider.value;
            }

            updateSlider();

            slider.addEventListener("input", updateSlider);
            slider.addEventListener("change", updateSlider);
            slider.addEventListener("touchmove", updateSlider);
        };

        function startTest() { // Collects inputted details and moves to test screen
            const age = document.getElementById("age").value.trim();
            const experience = document.getElementById("experience").value;

            if (age === "" || isNaN(age)) {
                alert("Please enter a valid age");
                return;
            }

            participantData.age = age;
            participantData.experience = experience;

            document.getElementById("startScreen").style.display = "none";
            document.getElementById("testScreen").style.display = "block";

            shuffle(emailList);
            showTrial();
        }

        function shuffle(array) { // Randomises order of emails
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function showTrial() { // Displays current email / Displays finish
            if (trialIndex >= emailList.length) {
                document.getElementById("emailBox").innerHTML = "Test Complete! <br> Please copy or download your <br> results and reply to the email.";
                document.getElementById("trialCounter").innerText = "";

                document.getElementById("feedback").style.display = "none";

                document.getElementById("responseButtons").style.display = "none";
                document.getElementById("endButtons").style.display = "block";

                return;
            }

            const email = emailList[trialIndex];

            document.getElementById("sender").innerText = email.sender;
            document.getElementById("subject").innerText = email.subject;
            document.getElementById("body").innerText = email.body;

            document.getElementById("trialCounter").innerText =
                `Email ${trialIndex + 1} of ${emailList.length}`;

            document.getElementById("feedback").innerText = "";
        }

        function respond(response) { // Handles user response 
            if (trialIndex >= emailList.length) return;

            const email = emailList[trialIndex];
            const correct = (response === email.malicious);

            results.push({
                trial: trialIndex + 1,
                sender: email.sender,
                subject: email.subject,
                correctAnswer: email.malicious,
                userResponse: response,
                correct: correct
            });

            document.getElementById("feedback").innerText = correct ? "Correct" : "Incorrect";

            trialIndex++;
            setTimeout(showTrial, 800);
        }

        function generateResultsText() { // Generates results in text form for copying
            const totalCorrect = results.filter(r => r.correct).length;
            const totalTrials = results.length;

            let text = `Participant Data:\n`;
            text += `Age: ${participantData.age}\n`;
            text += `Technical Experience: ${participantData.experience}\n\n`;
            text += `Score: ${totalCorrect}/${totalTrials}\n\n`;

            results.forEach(r => {
                text += `Trial ${r.trial} | Correct: ${r.correct}\n`;
            });

            return text;
        }

        function copyResults() { // Function for copying results
            const text = generateResultsText();

            navigator.clipboard.writeText(text).then(() => {
                alert("Results copied to clipboard!");
            }).catch(() => {
                alert("Copy failed. Please try again.");
            });
        }

        function downloadResults() { // Function for downloading results
            const text = generateResultsText();

            const blob = new Blob([text], { type: "text/plain" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "results.txt";
            a.click();

            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
